# turnserver.conf — Coturn TURN Server configuration
#
# This file is optional. If present at /config/turnserver.conf on your
# Home Assistant instance, it will be used instead of the options
# configured in the add-on UI.
#
# To activate: place this file at:
#   /config/turnserver.conf
# Then restart the add-on.
#
# Full reference: https://github.com/coturn/coturn/blob/master/examples/etc/turnserver.conf

# ── Listening ────────────────────────────────────────────────────────────────

# TURN/STUN listening port (TCP + UDP)
listening-port=3478

# TLS/DTLS listening port
tls-listening-port=5349

# Relay (media) UDP port range — open these in your router firewall
min-port=49152
max-port=65535

# ── Identity ─────────────────────────────────────────────────────────────────

# Realm — your domain or local hostname
realm=homeassistant.local

# Long-term credential — add as many users as needed
# Format: user=username:password
user=homeassistant:changeme

# ── IP addresses ─────────────────────────────────────────────────────────────

# Your public / external IP address.
# Comment this out to let detect-external-ip handle it automatically.
# external-ip=203.0.113.1

# If your machine has multiple NICs, bind to a specific local IP.
# listening-ip=192.168.1.100

# ── Security ─────────────────────────────────────────────────────────────────

# Use long-term credential mechanism (required for most WebRTC use cases)
lt-cred-mech

# Add STUN/TURN fingerprints to messages
fingerprint

# Reject multicast relay addresses
no-multicast-peers

# Disable the Coturn CLI (recommended unless debugging)
no-cli

# ── TLS (optional) ───────────────────────────────────────────────────────────
# Uncomment and point to your certificates to enable TURNS (TLS).
# Certificates must be readable inside the container.

# no-tls
# no-dtls
# cert=/ssl/fullchain.pem
# pkey=/ssl/privkey.pem

# ── Logging ──────────────────────────────────────────────────────────────────

# Log to stdout so HA captures it in the add-on log viewer
log-file=stdout

# Increase verbosity for debugging (comment out in production)
# verbose
